      <svg className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
    );

    // Get fallback key helper
    const getSafeEnvApiKey = () => {
      try {
        if (typeof process !== "undefined" && process.env) {
          return process.env.REACT_APP_GEMINI_API_KEY || "";
        }
      } catch (err) {}
      return "";
    };

    const ENV_API_KEY = getSafeEnvApiKey();

    function App() {
      const [formData, setFormData] = useState({
        name: '',
        role: '',
        company: '',
        skills: '',
        jobDescription: '',
        templateStyle: 'metric',
        writingTone: 'confident'
      });

      const [resumeFile, setResumeFile] = useState(null);
      const [resumeText, setResumeText] = useState("");
      const [isParsingResume, setIsParsingResume] = useState(false);
      const [parsedPreviewOpen, setParsedPreviewOpen] = useState(false);

      const [appMode, setAppMode] = useState('gemini'); 
      const [userApiKey, setUserApiKey] = useState("");
      const [showApiKey, setShowApiKey] = useState(false);
      
      const [isGenerating, setIsGenerating] = useState(false);
      const [generationStep, setGenerationStep] = useState("");
      const [generatedLetter, setGeneratedLetter] = useState("");
      const [editedLetter, setEditedLetter] = useState(""); 
      const [isEditing, setIsEditing] = useState(false);
      const [activeTab, setActiveTab] = useState('preview');
      const [zoomLevel, setZoomLevel] = useState(100);
      
      const [errorFeedback, setErrorFeedback] = useState(null);
      const [successFeedback, setSuccessFeedback] = useState("");
      const [copied, setCopied] = useState(false);
      const [dragActive, setDragActive] = useState(false);
      const [savedDrafts, setSavedDrafts] = useState([]);

      useEffect(() => {
        // Load PDF.js engine client-side
        if (!window.pdfjsLib) {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          script.async = true;
          script.onload = () => {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          };
          document.head.appendChild(script);
        }

        const savedKey = localStorage.getItem('saas_gemini_key');
        if (savedKey) {
          setUserApiKey(savedKey);
        }

        const cachedDrafts = localStorage.getItem('covercraft_drafts_v3');
        if (cachedDrafts) {
          try {
            setSavedDrafts(JSON.parse(cachedDrafts));
          } catch (err) {}
        }

        // Leave canvas blank on mount, allowing user parameters to build contextual documents
        setGeneratedLetter("");
        setEditedLetter("");
      }, []);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const getActiveApiKey = () => {
        return userApiKey || ENV_API_KEY || "";
      };

      const handleSimulationMode = () => {
        const { name, role, company } = formData;
        const formattedName = (name || "CANDIDATE NAME").toUpperCase();
        const formattedRole = role || "Target Role";
        const formattedCompany = company || "Target Company";

        return `# ${formattedName}
Core Competency Profile | Technical Vector • Applied Methodologies
Target: ${formattedRole} @ ${formattedCompany}

I build highly optimized solutions engineered for standard system scalability and high-availability frameworks, focusing on driving immediate value and strategic operational performance.

* **35% Operational Enhancement**: Successfully optimized internal workflow configurations, accelerating throughput metrics and significantly reducing resource consumption patterns.
* **12% Project Precision**: Oversaw systemic feature validation alignments and regression protocols, securing seamless code deployment integrity across multi-tiered cloud interfaces.

I bring a structured approach to technical engineering challenges, ensuring that team metrics, milestone velocities, and clean integration strategies align perfectly with the overarching product lifecycle. I look forward to demonstrating how my specialized background addresses your current expansion initiatives.`;
      };

      const parseResumeFile = async (file) => {
        setIsParsingResume(true);
        setErrorFeedback(null);
        setSuccessFeedback("");
        
        try {
          const fileName = file.name.toLowerCase();

          if (fileName.endsWith('.pdf')) {
            if (!window.pdfjsLib) {
              throw new Error("PDF parser loading. Please drop the file again in a moment.");
            }
            
            const reader = new FileReader();
            reader.onload = async (e) => {
              try {
                const typedarray = new Uint8Array(e.target.result);
                const pdf = await window.pdfjsLib.getDocument(typedarray).promise;
                let textContent = "";
                
                const pagesToParse = Math.min(pdf.numPages, 4);
                for (let i = 1; i <= pagesToParse; i++) {
                  const page = await pdf.getPage(i);
                  const textObj = await page.getTextContent();
                  const pageText = textObj.items.map(item => item.str).join(" ");
                  textContent += pageText + "\n";
                }
                
                if (!textContent.trim()) {
                  throw new Error("This PDF does not contain selectable text.");
                }
                
                setResumeText(textContent.trim());
                setSuccessFeedback(`Parser loaded ${textContent.trim().split(/\s+/).length} words from your Resume!`);
                setIsParsingResume(false);
              } catch (err) {
                setErrorFeedback(`PDF Parsing Exception: ${err.message}`);
                setIsParsingResume(false);
              }
            };
            reader.readAsArrayBuffer(file);
            
          } else if (fileName.endsWith('.txt') || fileName.endsWith('.md')) {
            const reader = new FileReader();
            reader.onload = (e) => {
              setResumeText(e.target.result);
              setSuccessFeedback(`Successfully imported text resume layout!`);
              setIsParsingResume(false);
            };
            reader.readAsText(file);
          } else {
            throw new Error("Unsupported file. Please drag/drop .pdf, .txt, or .md templates.");
          }
        } catch (err) {
          setErrorFeedback(err.message);
          setIsParsingResume(false);
        }
      };

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          const file = e.dataTransfer.files[0];
          setResumeFile(file);
          parseResumeFile(file);
        }
      };

      const handleFileChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          const file = e.target.files[0];
          setResumeFile(file);
          parseResumeFile(file);
        }
      };

      const callGeminiWithBackoff = async (payload, key) => {
        const delays = [1000, 2000, 4000, 8000, 16000];
        let lastError = null;
        
        for (let attempt = 0; attempt <= 5; attempt++) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
              const errData = await response.json().catch(() => ({}));
              throw new Error(errData.error?.message || `HTTP Server error: ${response.status}`);
            }
            
            const result = await response.json();
            return result;
          } catch (error) {
            lastError = error;
            if (attempt < 5) {
              await new Promise(resolve => setTimeout(resolve, delays[attempt]));
            }
          }
        }
        throw lastError || new Error("Failed to contact Google Gemini API.");
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setErrorFeedback(null);
        setSuccessFeedback("");

        if (!formData.name || !formData.role || !formData.company) {
          setErrorFeedback("Missing criteria. Please specify Candidate Name, Target Role, and Target Company.");
          return;
        }

        if (appMode === 'simulation') {
          setIsGenerating(true);
          setGenerationStep("Analyzing target layout guidelines...");
          await new Promise(r => setTimeout(r, 350));
          setGenerationStep("Generating scannable executive blocks...");
          await new Promise(r => setTimeout(r, 300));
          
          const letter = handleSimulationMode();
          setGeneratedLetter(letter);
          setEditedLetter(letter);
          setIsGenerating(false);
          setActiveTab('preview');
          return;
        }

        const apiKey = getActiveApiKey();
        
        // GUARD CHECK: Prevent the unregistered caller error shown in image_36e609.png
        if (!apiKey || apiKey.trim() === "") {
          setErrorFeedback("Gemini API Key is missing. Because you are running on Localhost, Google requires you to input an API Key in the 'Sandbox Platform Credentials' box on the left. Alternatively, switch to 'Simulation' mode to test instantly without a key!");
          return;
        }

        setIsGenerating(true);
        setGenerationStep("Structuring layout with standard 1-inch printable margins...");
        await new Promise(r => setTimeout(r, 400));

        const systemPrompt = `You are a premier executive resume and cover letter architect.
Your task is to produce an ultra-scannable, highly polished, single-page executive cover letter structured EXACTLY like the user-referenced template in "image_2a0eb8.png".

STRICT FORMATTING AND MARGIN RULES:
1. Word Count limit: 250 - 290 words max. Must comfortably fit on a standard A4 page with 1-inch (2.54cm) margins.
2. Structure must follow the exact visual hierarchy of "image_2a0eb8.png":
   - Line 1: Header - CANDIDATE NAME (all-caps, elegant, bold)
   - Line 2: Divider bar of competencies (e.g., Skill 1 & Skill 2 | Skill 3 • Skill 4 • Skill 5)
   - Line 3: Target line (e.g., Target: [Role] @ [Company Name])
   - Line 4: Compact high-impact opening paragraph (approx 2 sentences, describing high-performance value).
   - Section 5: Dynamic bullet points. Exactly 2 highly quantified performance bullets. The numeric metric MUST begin the bullet item in bold (e.g., "* **40% Latency Reduction**: Architected..." or "* **15% Accuracy Optimization**: Developed..."). Keep bullet texts highly technical and data-driven.
   - Section 6: Standard professional evolution context paragraph proving alignment with target stack and scaling capabilities.
   - Section 7: Elite close proposing brief discussions or roadmap alignments.
3. No brackets [like this], placeholder texts, or standard generic "Dear Hiring Manager" headers if we want the crisp modern format from the image. Match the clean start of the reference letter directly.`;

        const userPrompt = `
Generate a tailored premium cover letter targeting these exact vectors:
- Candidate Name: ${formData.name}
- Target Job Role: ${formData.role}
- Target Company: ${formData.company}
- Core Skills / Stack: ${formData.skills || 'Not specified'}

${formData.jobDescription ? `Target Job Description Context:\n"""\n${formData.jobDescription}\n"""` : ''}
${resumeText ? `Candidate's Parsed Resume:\n"""\n${resumeText}\n"""` : 'No resume file provided.'}

Deliver the response in clean Markdown. Strictly follow the single-page, 1-inch margins layout from image_2a0eb8.png. Do not write filler. Ensure the metrics are bolded first in each bullet.`;

        const payload = {
          contents: [{ parts: [{ text: userPrompt }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] }
        };

        try {
          setGenerationStep("Injecting AI metrics via Gemini-3-Flash...");
          const result = await callGeminiWithBackoff(payload, apiKey);
          
          setGenerationStep("Calculating A4 printable bounds...");

            role: formData.role || "Target Role",
            content: generatedText,

          setSavedDrafts(updatedDrafts);
          localStorage.setItem('covercraft_drafts_v3', JSON.stringify(updatedDrafts));
          
          setSuccessFeedback("Perfect single-page cover letter compiled successfully!");

          textarea.focus();

          const successful = document.execCommand('copy');

      const parseMarkdownToHtml = (markdown, forPrint = false) => {
        if (!markdown) return "";
        
        const lines = markdown.split('\n');
        let htmlContent = [];
        let inList = false;
        let listItems = [];

        const flushList = () => {
          if (listItems.length > 0) {
            htmlContent.push(
              `<ul class="list-disc pl-5 mb-4 space-y-3 ${forPrint ? 'text-[#111]' : 'text-slate-300'}">
                ${listItems.map(item => `<li class="leading-relaxed text-xs md:text-sm text-justify">${item}</li>`).join('')}
              </ul>`
            );
            listItems = [];
            inList = false;
          }
        };

        let lineIndex = 0;
        for (let line of lines) {
          let trimmed = line.trim();
          
          const formatInline = (text) => {
            return text.replace(/\*\*(.*?)\*\*/g, `<strong class="font-bold ${forPrint ? 'text-black font-bold' : 'text-teal-400 font-bold'}">$1</strong>`);
          };

          if (trimmed.startsWith('# ')) {
            flushList();
            const headerName = trimmed.replace('# ', '').toUpperCase();
            htmlContent.push(`<h1 class="text-lg md:text-xl font-bold tracking-tight ${forPrint ? 'text-black' : 'text-white'} uppercase mb-1">${formatInline(headerName)}</h1>`);
          } else if (lineIndex === 1 && !trimmed.startsWith('*') && trimmed.includes('|')) {
            flushList();
            htmlContent.push(`<div class="text-xs md:text-sm tracking-wide ${forPrint ? 'text-gray-700' : 'text-slate-300'} mb-1.5 font-sans">${formatInline(trimmed)}</div>`);
          } else if (trimmed.startsWith('Target:')) {
            flushList();
            htmlContent.push(`<div class="text-xs md:text-sm font-semibold tracking-wide ${forPrint ? 'text-gray-900' : 'text-teal-300'} mb-4 pb-3 border-b ${forPrint ? 'border-gray-300' : 'border-slate-800'} font-sans">${formatInline(trimmed)}</div>`);
          } else if (trimmed.startsWith('### ')) {
            flushList();
            htmlContent.push(`<h3 class="text-sm font-bold ${forPrint ? 'text-black' : 'text-slate-100'} mt-4 mb-2">${formatInline(trimmed.replace('### ', ''))}</h3>`);
          } else if (trimmed.startsWith('## ')) {
            flushList();
            htmlContent.push(`<h2 class="text-md font-bold ${forPrint ? 'text-black' : 'text-teal-300'} mt-5 mb-3">${formatInline(trimmed.replace('## ', ''))}</h2>`);
          } else if (trimmed.startsWith('* ') || trimmed.startsWith('- ') || trimmed.startsWith('• ')) {
            inList = true;
            const cleaned = trimmed.replace(/^[*•-]\s+/, '');
            listItems.push(formatInline(cleaned));
          } else if (trimmed === '') {
            flushList();
          } else {
            if (inList) {
              listItems[listItems.length - 1] += ' ' + formatInline(trimmed);
            } else {
              htmlContent.push(`<p class="mb-4 ${forPrint ? 'text-[#111]' : 'text-slate-300'} leading-relaxed text-xs md:text-sm text-justify">${formatInline(trimmed)}</p>`);
            }
          }
          lineIndex++;
        }
        
        flushList();
        return htmlContent.join('');
      };

                  {activeTab === 'preview' && !isEditing && (
                    <div className="flex items-center gap-1 bg-slate-950 px-2 py-1 rounded-lg border border-slate-800 text-[11px] text-slate-400 font-mono">
                      <button 
                        onClick={() => setZoomLevel(prev => Math.max(75, prev - 25))} 
                        className="p-1 hover:text-white transition-colors"
                      >
                        <ZoomOut />
                      </button>
                      <span className="px-1">{zoomLevel}%</span>
                      <button 
                        onClick={() => setZoomLevel(prev => Math.min(125, prev + 25))} 
                        className="p-1 hover:text-white transition-colors"
                      >
                        <ZoomIn />
                      </button>
                    </div>
                  )}

                  {(generatedLetter || editedLetter) && (
                    <div className="flex items-center gap-2">
                      <button
                        onClick={handleManualSave}
                        className="p-2 rounded-lg bg-slate-950 hover:bg-slate-850 text-emerald-400 hover:text-emerald-300 border border-slate-800 transition-all flex items-center gap-1.5 text-xs font-semibold"
                        title="Save draft manually to history logs"
                      >
                        <FileCheck />
                        <span>Save Draft</span>
                      </button>
                      <button
                        onClick={handleCopy}
                        className="p-2 rounded-lg bg-slate-950 hover:bg-slate-850 text-slate-300 hover:text-white border border-slate-800 transition-all flex items-center gap-1.5 text-xs font-medium"
                      >
                        {copied ? (
                          <>
                            <Check className="text-emerald-400 animate-bounce" />
                            <span className="text-emerald-400 font-bold">Copied!</span>
                          </>
                        ) : (
                          <>
                            <Copy />
                            <span>Copy</span>
                          </>
                        )
                        }
                      </button>
                      <button
                        onClick={handlePrint}
                        className="p-2 rounded-lg bg-slate-950 hover:bg-slate-850 text-slate-300 hover:text-white border border-slate-800 transition-all flex items-center gap-1.5 text-xs font-medium"
                      >
                        <Printer />
                        <span>Print Letter</span>
                      </button>
                      <button
                        onClick={downloadTxtFile}
                        className="p-2 rounded-lg bg-slate-950 hover:bg-slate-850 text-slate-300 hover:text-white border border-slate-800 transition-all flex items-center gap-1.5 text-xs font-medium"
                      >
                        <FileDown />
                        <span>Download TXT</span>
                      </button>
                    </div>
                  )}
                </div>

                {errorFeedback && (
                  <div className="m-4 p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-300 text-xs flex items-start gap-2">
                    <AlertCircle />
                    <div className="flex-1">
                      <span className="font-bold">Error:</span> {errorFeedback}
                    </div>
                  </div>
                )}

                {successFeedback && (
                  <div className="mx-4 mt-4 p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-300 text-xs flex items-start gap-2">
                    <Check className="text-emerald-400" />
                    <div className="flex-1">{successFeedback}</div>
                  </div>
                )}

                <div className="flex-1 p-4 sm:p-6 overflow-y-auto max-h-[700px] bg-slate-950/70 flex justify-center">
                  
                  {isGenerating ? (
                    <div className="h-full flex flex-col items-center justify-center py-20 text-center">
                      <div className="relative mb-6">
                        <div className="h-16 w-16 rounded-2xl bg-teal-500/10 flex items-center justify-center border border-teal-500/20">
                          <RefreshCw className="h-8 w-8 text-teal-400 animate-spin" />
                        </div>
                      </div>
                      <h4 className="text-md font-bold text-slate-200">Structuring A4 Document</h4>
                      <p className="text-xs text-slate-400 max-w-sm mt-2 font-mono text-teal-300">
                        {generationStep}
                      </p>
                    </div>

                  ) : generatedLetter ? (
                    
                    <div className="w-full max-w-[620px]">
                      {isEditing ? (
                        <div className="flex flex-col gap-2">
                          <div className="flex items-center justify-between text-xs text-slate-400 px-1">
                            <span>Direct Editor Mode (Editing Markdown Source)</span>
                            <button 
                              onClick={() => setIsEditing(false)}
                              className="text-teal-400 hover:underline font-semibold"
                            >
                              Save & View A4 Preview
                            </button>
                          </div>
                          <textarea
                            value={editedLetter}
                            onChange={(e) => setEditedLetter(e.target.value)}
                            rows="18"
                            className="w-full bg-slate-900 border border-slate-800 focus:border-teal-500 text-xs font-mono text-slate-300 rounded-xl p-4 outline-none transition-all resize-y leading-relaxed"
                          />
                        </div>
                      ) : activeTab === 'preview' ? (
                        
                        <div className="relative">
                          <div className="absolute -top-6 left-0 right-0 flex justify-between text-[10px] font-mono text-slate-500 px-1 select-none">
                            <span>Physical Page Grid: Standard 2.5cm Margins (image_2a0eb8.png)</span>
                            <span className="text-emerald-400">● Single Page Safe Bounds</span>
                          </div>
                          
                          <div 
                            className="bg-white text-slate-900 shadow-2xl rounded-sm border border-slate-300 flex flex-col justify-between font-serif origin-top transition-transform duration-200"
                            style={{
                              transform: `scale(${zoomLevel / 100})`,
                              width: '100%',
                              minHeight: '780px',
                              padding: '2.5cm',
                              boxSizing: 'border-box'
                            }}
                          >
                            <div 
                              className="prose prose-invert max-w-none text-slate-900 font-serif"
                              style={{ color: '#111' }}
                              dangerouslySetInnerHTML={{ __html: parseMarkdownToHtml(editedLetter || generatedLetter, true) }}
                            />
                          </div>
                        </div>

                      ) : (
                        <pre className="text-xs font-mono text-slate-300 whitespace-pre-wrap bg-slate-900 p-4 rounded-xl border border-slate-800 overflow-x-auto leading-relaxed">
                          {editedLetter || generatedLetter}
                        </pre>
                      )}

                      <div className="mt-6 pt-3 border-t border-slate-800/80 flex justify-between items-center text-[10px] font-mono text-slate-500">
                        <span>Target: image_2a0eb8.png Compliance Spec</span>
                        <div className="flex gap-4">
                          <span className="text-emerald-400 font-bold">{(editedLetter || generatedLetter).split(/\s+/).filter(Boolean).length} / 290 Words Target</span>
                          <span>{(editedLetter || generatedLetter).length} Characters</span>
                        </div>
                      </div>
                    </div>

                  ) : (
                    
                    <div className="h-full flex flex-col items-center justify-center py-16 text-center max-w-md mx-auto">
                      <div className="h-16 w-16 rounded-2xl bg-slate-900 flex items-center justify-center border border-slate-850 mb-6">
                        <FileText />
                      </div>
                      <h4 className="text-slate-200 font-bold text-sm">Interactive Cover Letter Canvas</h4>
                      <p className="text-xs text-slate-400 mt-2 leading-relaxed">
                        Set your parameters, upload a professional background resume file to match alignments, and select compile to generate a polished, highly concise letter.
                      </p>
                    </div>
                  )}

                </div>
              </div>

              {savedDrafts.length > 0 && (
                <div className="bg-slate-900 border border-slate-850 rounded-xl p-4 shadow-lg">
                  <h4 className="text-xs font-extrabold text-slate-300 flex items-center gap-1.5 mb-3">
                    <History />
                    Draft History Buffer (Last 10 Saved runs)
                  </h4>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-40 overflow-y-auto pr-1">
                    {savedDrafts.map((draft) => (
                      <div 
                        key={draft.id}
                        onClick={() => loadDraftFromHistory(draft)}
                        className="p-2.5 bg-slate-950 border border-slate-850 hover:border-teal-500/30 rounded-lg cursor-pointer flex items-center justify-between transition-all group"
                      >
                        <div className="flex-1 min-w-0 pr-2">
                          <h5 className="text-[11px] font-bold text-slate-200 truncate">{draft.company}</h5>
                          <p className="text-[9px] text-slate-500 truncate">{draft.role} | {draft.date}</p>
                        </div>
                        <button
                          onClick={(e) => deleteDraftFromHistory(e, draft.id)}
                          className="p-1 rounded text-slate-500 hover:text-rose-400 hover:bg-slate-900 transition-colors"
                        >
                          <Trash2 />
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

            </div>
          </main>

          <footer className="border-t border-slate-900 bg-slate-950 text-slate-500 text-xs py-8 mt-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center gap-3 text-center">
              <div className="flex items-center gap-1.5 text-slate-300 text-sm">
                <span>Built with</span>
                <span className="text-rose-500 animate-pulse">❤️</span>
                <span>by</span>
                <span className="font-bold text-teal-455 tracking-wide">Alok Kumar Mishra</span>
              </div>
              <div className="text-[11px] text-slate-500">
                &copy; 2026 CoverCraft AI. All rights reserved.
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
